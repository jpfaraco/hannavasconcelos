<div class="box cta-post">
  <p><strong>{{ include.heading }}</strong></p>
  {% if include.text %}<p>{{ include.text }}</p>{% endif %}
  <a href="{{ include.url }}" class="cta button"
    onclick="gtag('event', 'cta_click', { 'location': '{{ include.location }}' });">
    {{ include.cta_label | default: "Agendar consulta" }}
  </a>
</div>
